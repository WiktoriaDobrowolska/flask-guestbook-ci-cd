version: '3.8'
services:
  web:
    build: .
    container_name: flask-app
    ports:
      - "5001:5000"
    environment:
      MYSQL_HOST: myapp_mysql
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: mydb
    depends_on:
      - db
    networks:
      - app-network
 
  db:
    image: mysql:5.7
    container_name: myapp_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - app_mysql_data:/var/lib/mysql
    networks:
      - app-network
 
networks:
  app-network:
 
volumes:
  app_mysql_data:
